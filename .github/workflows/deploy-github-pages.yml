# 构建并部署到 GitHub Pages（仓库 Settings → Pages → Source: GitHub Actions）
name: 部署 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建
        env:
          # 与仓库名一致，访问地址：https://<user>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Hash 路由：深链不再请求 /repo/xxx（避免文档 404）；旧 path 书签会重定向到 #/xxx
          VITE_HASH_ROUTER: 'true'
        run: npm run build

      # SPA 刷新/深链：用 index.html 作为 404，避免子路径 404
      - name: 生成 404 页（SPA）
        run: cp dist/index.html dist/404.html

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
